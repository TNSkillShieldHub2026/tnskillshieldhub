<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Founder Login | TN Skill Shield Hub</title>
<style>
  body { font-family: 'DM Sans', sans-serif; background: #0a1f5c; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
  .login-card { background: white; padding: 40px; border-radius: 20px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
  h2 { color: #0a1f5c; text-align: center; margin-bottom: 25px; }
  .input-group { margin-bottom: 20px; }
  label { display: block; margin-bottom: 5px; color: #333; font-weight: 600; }
  input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
  .btn-login { width: 100%; padding: 14px; background: #c5a059; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 10px; }
  .footer-text { text-align: center; margin-top: 20px; font-size: 14px; }
</style>
</head>
<body>

<div class="login-card">
  <h2>Founder Login</h2>
  <div class="input-group">
    <label>Corporate/Founder Email</label>
    <input type="email" placeholder="founder@tnskillshield.ai">
  </div>
  <div class="input-group">
    <label>Access Code</label>
    <input type="password" placeholder="••••••••">
  </div>
  <button class="btn-login" onclick="window.location.href='founder-dashboard.html'">Sign In</button>
  <p class="footer-text">Secure Access for TN SkillShield Admin</p>
</div>

</body>
</html>
