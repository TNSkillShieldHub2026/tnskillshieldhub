<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mentor Registration | TN Skill Shield</title>
<style>
  body{font-family:'DM Sans',sans-serif;background:#f0f6ff;padding:50px;}
  .card{max-width:500px;margin:auto;background:#fff;padding:30px;border-radius:15px;box-shadow:0 10px 25px rgba(0,0,0,0.1);}
  h2{color:#0a1f5c;margin-bottom:20px;}
  input, select{width:100%;padding:12px;margin:10px 0;border:1px solid #ccc;border-radius:8px;}
  button{width:100%;padding:12px;background:#0a1f5c;color:#fff;border:none;border-radius:8px;cursor:pointer;}
</style>
</head>
<body>
<div class="card">
  <h2>Mentor Registration</h2>
  <input type="text" placeholder="Full Name">
  <input type="email" placeholder="Email ID">
  <select>
    <option>Expertise Field</option>
    <option>Tech/CS</option>
    <option>Commerce/Finance</option>
    <option>Communication/Soft Skills</option>
  </select>
  <input type="text" placeholder="LinkedIn Profile URL">
  <button>Register as Mentor</button>
</div>
</body>
</html>
